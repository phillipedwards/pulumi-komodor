# Publishes a GitHub Release with prebuilt provider binaries when a vX.Y.Z tag is pushed.
#
# Unlike release.yml/prerelease.yml (autogenerated by pulumi/ci-mgmt), this workflow does not
# depend on Pulumi's internal ESC/OIDC secrets or registry publishing (npm/PyPI/NuGet). It only
# needs the default GITHUB_TOKEN. Consumers install the plugin directly from the GitHub release,
# e.g. `pulumi plugin install resource komodor <version> --server github://api.github.com/phillipedwards/pulumi-komodor`.
name: gh-release

on:
  push:
    tags:
      - v*.*.*

permissions:
  contents: write

env:
  PULUMI_VERSION: 3.253.0
  PULUMI_CONVERTER_TERRAFORM_VERSION: 1.3.0

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: provider/go.mod

      - name: Install Pulumi CLI
        run: |
          curl -fsSL https://get.pulumi.com | sh -s -- --version "$PULUMI_VERSION"
          echo "$HOME/.pulumi/bin" >> "$GITHUB_PATH"

      - name: Install terraform converter plugin
        run: pulumi plugin install converter terraform "$PULUMI_CONVERTER_TERRAFORM_VERSION"

      - name: Determine provider version
        run: echo "PROVIDER_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Generate schema
        run: make schema

      - name: Build and package all platforms
        env:
          SKIP_SIGNING: "true"
        run: |
          make provider_dist
          make provider_dist-windows-arm64

      - name: Calculate checksums
        working-directory: bin
        run: shasum -a 256 *.tar.gz > "pulumi-komodor_${PROVIDER_VERSION}_checksums.txt"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            bin/*.tar.gz
            bin/*_checksums.txt
